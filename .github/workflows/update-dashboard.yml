name: 更新数据看板

on:
  schedule:
    # 北京时间 10:00-23:00 每 2 小时（UTC 02,04,06,08,10,12,14,15）
    - cron: "0 2,4,6,8,10,12,14,15 * * *"
    # 周五比赛日加密集更新：北京时间 20:00 / 20:30 / 21:00（UTC 12:00 / 12:30 / 13:00，周五=5）
    - cron: "0 12 * * 5"
    - cron: "30 12 * * 5"
    - cron: "0 13 * * 5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dashboard
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 拉取数据并生成看板
        run: python publish_dashboard.py

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          commit_message: "chore: 自动更新看板数据"
